{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Listado de Productos</h2>
    <a href="/nuevo" class="btn btn-success">➕ Nuevo Producto</a>
</div>

<table class="table table-striped table-bordered">
    <thead class="table-dark">
        <tr>
            <th>ID</th><th>Nombre</th><th>Categoría</th><th>Precio</th><th>Stock</th><th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for producto in productos %}
        <tr>
            <td>{{ producto[0] }}</td>
            <td>{{ producto[1] }}</td>
            <td>{{ producto[2] }}</td>
            <td>${{ producto[3] }}</td>
            <td>{{ producto[4] }}</td>
            <td>
                <a href="/editar/{{ producto[0] }}" class="btn btn-warning btn-sm">✏️ Editar</a>
                <a href="/eliminar/{{ producto[0] }}" class="btn btn-danger btn-sm" onclick="return confirm('¿Eliminar producto?')">🗑️ Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
