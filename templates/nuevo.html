{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-4">
                <li class="breadcrumb-item"><a href="/">Dashboard</a></li>
                <li class="breadcrumb-item active">Nuevo Registro</li>
            </ol>
        </nav>

        <div class="card shadow-lg border-0">
            <div class="card-header bg-dark text-white py-3">
                <h5 class="mb-0 fw-bold"><i class="fas fa-plus-square me-2 text-primary"></i>INICIALIZAR NUEVO ACTIVO</h5>
            </div>
            <div class="card-body p-4 bg-white">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label small fw-bold text-uppercase">Nombre del Producto</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="fas fa-box"></i></span>
                                <input type="text" name="nombre" class="form-control shadow-none" placeholder="Identificador único" required>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label small fw-bold text-uppercase">Categoría / Segmento</label>
                            <input type="text" name="categoria" class="form-control shadow-none" placeholder="Clasificación lógica" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-uppercase">Costo Unitario (USD)</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" step="0.01" name="precio" class="form-control shadow-none" placeholder="0.00" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-uppercase">Stock Inicial</label>
                            <input type="number" name="stock" class="form-control shadow-none" placeholder="Cantidad" required>
                        </div>
                    </div>

                    <div class="mt-4 pt-3 border-top d-flex justify-content-between">
                        <a href="/" class="btn btn-outline-secondary"> 
                            <i class="fas fa-times me-1"></i> Abortar
                        </a>
                        <button type="submit" class="btn btn-primary px-4 shadow">
                            <i class="fas fa-save me-2"></i>Registrar en DB
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
