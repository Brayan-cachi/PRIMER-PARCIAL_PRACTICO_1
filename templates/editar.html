{% extends "base.html" %}

{% block content %}
<h2>Editar Producto</h2>
<form method="POST">
    <div class="mb-3">
        <label>Nombre</label>
        <input type="text" name="nombre" value="{{ producto[1] }}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Categoría</label>
        <input type="text" name="categoria" value="{{ producto[2] }}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Precio</label>
        <input type="number" step="0.01" name="precio" value="{{ producto[3] }}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Stock</label>
        <input type="number" name="stock" value="{{ producto[4] }}" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">💾 Actualizar</button>
    <a href="/" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
