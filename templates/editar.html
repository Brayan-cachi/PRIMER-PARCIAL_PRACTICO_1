{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-4">
                <li class="breadcrumb-item"><a href="/">Dashboard</a></li>
                <li class="breadcrumb-item active">Modificar Registro</li>
            </ol>
        </nav>

        <div class="card shadow-lg border-0">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0 fw-bold">
                    <i class="fas fa-sync-alt me-2"></i>MODIFICAR REGISTRO: #00{{ producto[0] }}
                </h5>
            </div>
            <div class="card-body p-4 bg-white">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label small fw-bold text-uppercase">Nombre del Producto</label>
                            <div class="input-group border rounded">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-tag"></i></span>
                                <input type="text" name="nombre" value="{{ producto[1] }}" class="form-control border-0 shadow-none" required>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label small fw-bold text-uppercase">Categoría</label>
                            <input type="text" name="categoria" value="{{ producto[2] }}" class="form-control shadow-none" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-uppercase">Precio Actual</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" step="0.01" name="precio" value="{{ producto[3] }}" class="form-control shadow-none" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-uppercase">Stock en Almacén</label>
                            <input type="number" name="stock" value="{{ producto[4] }}" class="form-control shadow-none" required>
                        </div>
                    </div>

                    <div class="mt-4 pt-3 border-top d-flex justify-content-between">
                        <a href="/" class="btn btn-light border"> 
                            <i class="fas fa-arrow-left me-1"></i> Regresar
                        </a>
                        <button type="submit" class="btn btn-success px-4 shadow">
                            <i class="fas fa-check-circle me-2"></i>Compilar Cambios
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-light py-2 text-center text-muted">
                <small><i class="fas fa-info-circle"></i> Los cambios realizados se reflejarán instantáneamente en la base de datos principal.</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
